<!DOCTYPE html>
<html>
<head>
<title>Resume & Bio Data Builder</title>

<style>

body{
font-family:Arial;
margin:40px;
}

input, textarea{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

.sectionbox{
border:1px solid #ccc;
padding:20px;
margin-bottom:30px;
}

/* Resume Layout */

.resume{
display:none;
margin-top:30px;
width:900px;
display:flex;
}

.left{
width:35%;
background:#dfe6f1;
padding:20px;
}

.right{
width:65%;
padding:20px;
}

/* Biodata Layout */

.biodata{
display:none;
margin-top:30px;
width:800px;
font-family:Georgia;
}

.name{
text-align:center;
font-size:30px;
color:#2b4f8c;
}

.sectiontitle{
color:#2b4f8c;
border-bottom:2px solid #ccc;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Resume & Bio-Data Builder</h1>

<!-- RESUME INPUT -->

<div class="sectionbox">

<h2>Resume Details</h2>

<input id="rname" placeholder="Full Name">
<input id="rphone" placeholder="Phone">
<input id="remail" placeholder="Email">
<textarea id="rcommunication" placeholder="Communication Skills"></textarea>
<textarea id="reducation" placeholder="Education"></textarea>
<textarea id="rexperience" placeholder="Experience"></textarea>
<textarea id="rsummary" placeholder="Summary"></textarea>

<button onclick="generateResume()">Generate Resume</button>

</div>


<!-- BIODATA INPUT -->

<div class="sectionbox">

<h2>Bio-Data Details</h2>

<input id="bname" placeholder="Full Name">
<input id="bage" placeholder="Age">
<input id="bdob" placeholder="DOB">
<input id="bplace" placeholder="Place of Birth">
<input id="bcaste" placeholder="Caste">
<input id="bheight" placeholder="Height">
<input id="beducation" placeholder="Education">
<input id="boccupation" placeholder="Occupation">

<textarea id="babout" placeholder="About Me"></textarea>

<input id="bfather" placeholder="Father Name">
<input id="bmother" placeholder="Mother Name">

<input id="bphone" placeholder="Phone">
<textarea id="baddress" placeholder="Address"></textarea>

<button onclick="generateBiodata()">Generate Bio Data</button>

</div>


<!-- RESUME TEMPLATE -->

<div class="resume" id="resume">

<div class="left">

<h3>Contact</h3>
<p id="out_rphone"></p>
<p id="out_remail"></p>

<h3>Communication</h3>
<p id="out_rcommunication"></p>

</div>

<div class="right">

<h1 id="out_rname"></h1>

<h3>Education</h3>
<p id="out_reducation"></p>

<h3>Experience</h3>
<p id="out_rexperience"></p>

<h3>Summary</h3>
<p id="out_rsummary"></p>

</div>

</div>


<!-- BIODATA TEMPLATE -->

<div class="biodata" id="biodata">

<div class="name" id="out_bname"></div>

<p>Age: <span id="out_bage"></span></p>
<p>DOB: <span id="out_bdob"></span></p>

<p>Place of Birth: <span id="out_bplace"></span></p>
<p>Caste: <span id="out_bcaste"></span></p>
<p>Height: <span id="out_bheight"></span></p>
<p>Education: <span id="out_beducation"></span></p>
<p>Occupation: <span id="out_boccupation"></span></p>

<h3 class="sectiontitle">About Me</h3>
<p id="out_babout"></p>

<h3 class="sectiontitle">Family Background</h3>
<p>Father: <span id="out_bfather"></span></p>
<p>Mother: <span id="out_bmother"></span></p>

<h3 class="sectiontitle">Contact Details</h3>
<p id="out_bphone"></p>
<p id="out_baddress"></p>

</div>


<script>

function generateResume(){

document.getElementById("resume").style.display="flex"
document.getElementById("biodata").style.display="none"

out_rname.innerText=rname.value
out_rphone.innerText=rphone.value
out_remail.innerText=remail.value
out_rcommunication.innerText=rcommunication.value
out_reducation.innerText=reducation.value
out_rexperience.innerText=rexperience.value
out_rsummary.innerText=rsummary.value

}

function generateBiodata(){

document.getElementById("biodata").style.display="block"
document.getElementById("resume").style.display="none"

out_bname.innerText=bname.value
out_bage.innerText=bage.value
out_bdob.innerText=bdob.value
out_bplace.innerText=bplace.value
out_bcaste.innerText=bcaste.value
out_bheight.innerText=bheight.value
out_beducation.innerText=beducation.value
out_boccupation.innerText=boccupation.value
out_babout.innerText=babout.value
out_bfather.innerText=bfather.value
out_bmother.innerText=bmother.value
out_bphone.innerText=bphone.value
out_baddress.innerText=baddress.value

}

</script
