 <!DOCTYPE html>
<html>
<head>
<!-- 
    This section contains all the styling (CSS) for our webpage
    It's like giving instructions to the browser on how the page should look
-->
<style>
/* 
    BODY STYLES - Controls the main background and layout of the entire page
*/
body { 
    /* Uses a monospace font (like code font) for a techy look */
    font-family: monospace; 
    
    /* Creates a beautiful gradient background from blue to purple */
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
    
    /* Makes the page take full screen height */
    height: 100vh; 
    
    /* Centers everything perfectly both vertically and horizontally */
    display: flex; 
    align-items: center; 
    justify-content: center; 
}

/* 
    CONTAINER STYLES - The main white box that holds all our content
*/
.container {
    /* White background to contrast with the colorful page background */
    background: white;
    
    /* Adds padding inside the box (top/bottom 60px, left/right 40px) */
    padding: 60px 40px;
    
    /* Rounds the corners of the box */
    border-radius: 15px;
    
    /* Creates a nice shadow effect to make it pop off the page */
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    
    /* Centers all text inside this box */
    text-align: center;
    
    /* Limits how wide the box can get (max 500px wide) */
    max-width: 500px;
}

/*
    HEADING STYLES - Makes our main title look professional
*/
h1 {
    /* Large font size for the title */
    font-size: 28px;
    
    /* Dark professional color */
    color: #2c3e50;
    
    /* Space below the title */
    margin-bottom: 10px;
    
    /* Adds a thick underline effect */
    border-bottom: 4px solid #34495e;
    
    /* Padding below the underline */
    padding-bottom: 20px;
}

/*
    PARAGRAPH STYLES - The text asking "What do you want to create?"
*/
p { 
    /* Medium-large font size */
    font-size: 18px; 
    
    /* Light gray color for secondary text */
    color: #7f8c8d; 
    
    /* Large space below the paragraph */
    margin-bottom: 50px; 
}

/*
    BUTTON GRID STYLES - Creates the layout for our two buttons
*/
.btn-grid {
    /* Uses flexbox to put buttons side by side */
    display: flex;
    
    /* Adds space (50px) between the two buttons */
    gap: 50px;
    
    /* Centers the buttons horizontally */
    justify-content: center;
}

/*
    INDIVIDUAL BUTTON STYLES - How each button looks normally
*/
.btn {
    /* Fixed width and height for perfect square buttons */
    width: 150px;
    height: 100px;
    
    /* Dark border around each button */
    border: 3px solid #34495e;
    
    /* White background */
    background: white;
    
    /* Large, bold text */
    font-size: 18px;
    font-weight: bold;
    
    /* Hand cursor when hovering (shows it's clickable) */
    cursor: pointer;
    
    /* Rounded corners */
    border-radius: 10px;
    
    /* Smooth animation for hover effects */
    transition: all 0.3s;
}

/*
    BUTTON HOVER EFFECTS - What happens when you mouse over a button
*/
.btn:hover {
    /* Changes background to blue when hovered */
    background: #3498db;
    
    /* Makes text white on hover */
    color: white;
    
    /* Matches border color to background */
    border-color: #3498db;
    
    /* Lifts button up slightly (cool effect!) */
    transform: translateY(-5px);
}

/*
    RESPONSIVE DESIGN - Makes it work great on mobile phones
*/
@media (max-width: 500px) {
    /* On small screens, stack buttons vertically instead of side-by-side */
    .btn-grid { 
        flex-direction: column; 
        gap: 30px; /* Smaller gap between stacked buttons */
    }
}
</style>
</head>
<body>
<!-- 
    MAIN CONTENT AREA - Everything the user sees is inside this white container
-->
<div class="container">
    <!-- 
        MAIN TITLE - "Resume Builder App"
        Styled with the h1 class we defined above
    -->
    <h1>Resume Builder App</h1>
    
    <!-- 
        QUESTION TEXT - Helps user understand what to do next
        Styled with the p class
    -->
    <p>What do you want to create?</p>
    
    <!-- 
        BUTTON LAYOUT - Contains our two clickable buttons
        Styled with btn-grid class to put them side by side
    -->
    <div class="btn-grid">
        <!-- 
            FIRST BUTTON - "Resume"
            Styled with btn class, will have hover effects
        -->
        <div class="btn">Resume</div>
        
        <!-- 
            SECOND BUTTON - "Bio-Data" 
            Same styling as the first button
        -->
        <div class="btn">Bio-Data</div>
    </div>
</div>

</body>
</html>
