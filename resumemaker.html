<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Resume Builder</title>
<style>
body{font-family:Arial, sans-serif;margin:0;background:#f4f4f4}
.container{display:grid;grid-template-columns:1fr 1fr;height:100vh}
.form-section{padding:20px;background:white;overflow:auto}
.preview-section{padding:20px;background:#fafafa;overflow:auto}
input,textarea{width:100%;padding:8px;margin:6px 0 14px;border:1px solid #ccc;border-radius:6px}
button{padding:10px 16px;border:none;border-radius:6px;background:#4CAF50;color:white;cursor:pointer}
.resume{background:white;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
.resume h1{margin-bottom:5px}
.section{margin-top:18px}
</style>
</head>
<body><div class="container"><div class="form-section">
<h2>Resume Builder</h2><label>Name</label> <input id="name" placeholder="Your name" />

<label>Email</label> <input id="email" placeholder="Email" />

<label>Phone</label> <input id="phone" placeholder="Phone" />

<label>Education</label>

<textarea id="education" placeholder="Your education"></textarea><label>Skills</label>

<textarea id="skills" placeholder="Your skills"></textarea><label>Experience</label>

<textarea id="experience" placeholder="Work experience"></textarea><button onclick="generateResume()">Generate Resume</button> <button onclick="downloadPDF()">Download / Print</button>

</div><div class="preview-section">
<div class="resume" id="resumePreview">
<h1 id="pname">Your Name</h1>
<p id="pcontact"></p><div class="section">
<h3>Education</h3>
<p id="pedu"></p>
</div><div class="section">
<h3>Skills</h3>
<p id="pskills"></p>
</div><div class="section">
<h3>Experience</h3>
<p id="pexp"></p>
</div></div>
</div></div><script>
function generateResume(){
const name=document.getElementById('name').value
const email=document.getElementById('email').value
const phone=document.getElementById('phone').value
const edu=document.getElementById('education').value
const skills=document.getElementById('skills').value
const exp=document.getElementById('experience').value
document.getElementById('pname').innerText=name

document.getElementById('pcontact').innerText=email+" | "+phone

document.getElementById('pedu').innerText=edu

document.getElementById('pskills').innerText=skills

document.getElementById('pexp').innerText=exp
}

function downloadPDF(){
window.print()
}
</script></body>
</html>
